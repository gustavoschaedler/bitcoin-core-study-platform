name: signet-core-study

# Layout:
#   - bitcoind            : Bitcoin Core node, Signet, RPC on 38332.
#   - redis               : faucet rate-limit + cache.
#   - web                 : main FastAPI app (home, faucet, mempool, wallet, stats, docs).
#   - display             : HDMI/kiosk dashboard.
#   - terminal-webui      : browser bitcoin-cli / RPC sandbox (FastAPI + bitcoin-cli).
#   - terminal-proxy      : nginx reverse proxy for the terminal.
#
# Two RPC auth modes (set BITCOIN_RPC_AUTH_MODE=password or =cookie in .env).
# In cookie mode all clients mount bitcoin-data:ro to read .cookie.

services:
  bitcoind:
    image: ${BITCOIN_REPO:-bitcoin/bitcoin}:${BITCOIN_VERSION:-29}
    container_name: signet-bitcoind
    restart: unless-stopped
    env_file: [.env]
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
      - ./bitcoind/bitcoin.conf:/bitcoin/bitcoin.conf:ro
      - ./bitcoind/entrypoint.sh:/usr/local/bin/signet-entrypoint.sh:ro
    entrypoint: ["/usr/local/bin/signet-entrypoint.sh"]
    expose:
      - "38332"
      - "38333"
      - "28332"
      - "28333"
      - "28334"
      - "28335"

  redis:
    image: redis:8-alpine
    container_name: signet-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  web:
    build:
      context: ./apps/web
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.14-slim}
    container_name: signet-web
    restart: unless-stopped
    env_file: [.env]
    depends_on: [bitcoind, redis]
    volumes:
      - ./docs:/app/docs:ro
      - bitcoin-data:/bitcoind-data:ro
    ports:
      - "127.0.0.1:8080:8080"

  display:
    build:
      context: ./apps/display
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.14-slim}
    container_name: signet-display
    restart: unless-stopped
    env_file: [.env]
    depends_on: [bitcoind]
    volumes:
      - bitcoin-data:/bitcoind-data:ro
    ports:
      - "127.0.0.1:8181:8181"

  terminal-webui:
    build:
      context: ./apps/terminal
      args:
        BITCOIN_REPO: ${BITCOIN_REPO:-bitcoin/bitcoin}
        BITCOIN_VERSION: ${BITCOIN_VERSION:-29}
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.14-slim}
    container_name: signet-terminal-webui
    restart: unless-stopped
    env_file: [.env]
    environment:
      BITCOIND_HOST: bitcoind
      BITCOIND_PORT: "38332"
      BITCOIND_USER: ${BITCOIN_RPC_USER}
      BITCOIND_PASS: ${BITCOIN_RPC_PASSWORD}
    depends_on: [bitcoind]
    volumes:
      - ./apps/terminal/version.txt:/app/version.txt:ro
      - bitcoin-data:/bitcoind-data:ro
    read_only: true
    tmpfs:
      - /tmp:size=16m
      - /home/sandbox/.bitcoin:uid=1000,gid=1000,mode=0700,size=1m
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]

  terminal-proxy:
    image: ${NGINX_IMAGE:-nginx:1.30-alpine}
    container_name: signet-terminal-proxy
    restart: unless-stopped
    depends_on: [terminal-webui]
    ports:
      - "127.0.0.1:${TERMINAL_HOST_PORT:-8182}:8181"
    volumes:
      - ./apps/terminal/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    cap_drop: [ALL]
    cap_add: [CHOWN, SETUID, SETGID, DAC_OVERRIDE, NET_BIND_SERVICE]
    security_opt: ["no-new-privileges:true"]

volumes:
  bitcoin-data:
  redis-data:
