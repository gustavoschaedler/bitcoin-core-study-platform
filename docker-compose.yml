services:
  bitcoind:
    image: bitcoin/bitcoin:29
    container_name: signet-bitcoind
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - bitcoin-data:/home/bitcoin/.bitcoin
      - ./bitcoin:/bitcoin
    command:
      - "-conf=/bitcoin/bitcoin.conf"
      - "-rpcuser=${BITCOIN_RPC_USER}"
      - "-rpcpassword=${BITCOIN_RPC_PASSWORD}"
    expose:
      - "38332"
      - "38333"
      - "28332"
      - "28333"
      - "28334"
      - "28335"

  redis:
    image: redis:8-alpine
    container_name: signet-redis
    restart: unless-stopped
    command: [ "redis-server", "--appendonly", "yes" ]
    volumes:
      - redis-data:/data

  faucet:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: faucet
        APP_PORT: 8080
    container_name: signet-faucet
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - bitcoind
      - redis
    volumes:
      - ./docs:/app/docs:ro
      - ./mempool-ui:/app/mempool-ui:ro
      - ./wallet-lab:/app/wallet-lab:ro
      - ./container-stats:/app/container-stats:ro
    ports:
      - "127.0.0.1:8080:8080"

  display:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_DIR: display
        APP_PORT: 8181
    container_name: signet-display
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - bitcoind
    ports:
      - "127.0.0.1:8181:8181"

volumes:
  bitcoin-data:
  redis-data:
