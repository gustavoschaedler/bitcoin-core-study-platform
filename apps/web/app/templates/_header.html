<header class="topbar">
  <a class="brand" href="/">
    <span class="mark">₿</span>
    <span class="brand-copy">
      <strong>Signet</strong>
      <small data-i18n="brand_subtitle">Core study platform</small>
    </span>
  </a>
  <nav class="primary-nav" aria-label="Primary">
    <a href="/" data-i18n="nav_home" class="{% if current_page == 'home' %}active{% endif %}">Home</a>
    <a href="/faucet" data-i18n="nav_faucet" class="{% if current_page == 'faucet' %}active{% endif %}">Faucet</a>
    <a href="/mempool" data-i18n="nav_mempool" class="{% if current_page == 'mempool' %}active{% endif %}">Mempool</a>
    <a href="/wallet" data-i18n="nav_wallet" class="{% if current_page == 'wallet' %}active{% endif %}">Wallet</a>
    <a href="/stats" data-i18n="nav_stats" class="{% if current_page == 'stats' %}active{% endif %}">Stats</a>
    <a href="/study-docs" data-i18n="nav_docs" class="{% if current_page == 'docs' %}active{% endif %}">Docs</a>
    <a id="header-display-link" href="http://localhost:8181" target="_blank" rel="noopener" data-i18n="nav_display">Display</a>
    <a id="header-terminal-link" href="http://localhost:8182" target="_blank" rel="noopener" data-i18n="nav_terminal">Terminal</a>
  </nav>
  {% if show_search %}
  <form class="node-search" id="node-search" role="search" autocomplete="off">
    <span class="search-mark" aria-hidden="true"></span>
    <input id="node-search-input" type="search" data-i18n-placeholder="search_placeholder" placeholder="Search transaction, block, hash or node metric">
    <button type="submit" data-i18n="search_button">Search</button>
    <div class="search-results" id="node-search-results" hidden></div>
  </form>
  {% endif %}
  <div class="top-actions">
    <span class="version-badge">v{{ version }}</span>
    <a class="github-link" href="https://github.com/gustavoschaedler/bitcoin-core-study-platform" target="_blank" rel="noopener" aria-label="GitHub">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
    <div class="last-refresh" aria-live="polite">
      <span data-i18n="nav_last_refresh">Last refresh</span>
      <strong id="updated">-</strong>
    </div>
    <div id="countdown-box" class="countdown-box" hidden>
      <span id="countdown-value">-</span><small>s</small>
    </div>
    <div class="settings-menu">
      <button id="settings-toggle" class="icon-button" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <div id="settings-popover" class="settings-popover" hidden>
        <button class="lang-option" data-lang="en-GB">
          <span class="flag">🇬🇧</span>
          <span class="label">English (UK)</span>
          <span class="check">✓</span>
        </button>
        <button class="lang-option" data-lang="pt-BR">
          <span class="flag">🇧🇷</span>
          <span class="label">Português (Brasil)</span>
          <span class="check">✓</span>
        </button>
      </div>
    </div>
  </div>
</header>
