<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="/static/css/header.css?v=20260508-cog-v4">
  <link rel="stylesheet" href="/static/css/wallet.css?v=20260509-wallet-v25">
</head>
<body data-default-lang="{{ lang }}" data-faucet-wallet="{{ faucet_wallet_name }}">
  {% include "_header.html" %}
  <main class="page">
    <section class="hero-row">
      <div class="hero-info">
        <p class="eyebrow">Signet</p>
        <h1 data-i18n="title">Wallet lab</h1>
        <p data-i18n="subtitle">Create wallets, derive addresses and manage keys.</p>
      </div>
      <div class="hero-create panel">
        <h2 class="panel-heading">
          <svg viewBox="0 0 24 24" class="panel-icon"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
          <span data-i18n="create_wallet">Create wallet</span>
        </h2>
        <form id="create-wallet">
          <input name="name" placeholder="study-wallet" data-i18n-placeholder="wallet_placeholder" required>
          <button type="submit" data-i18n="create">Create/load</button>
        </form>
      </div>
      <div id="faucet-wallet-panel" class="hero-faucet panel" hidden>
        <h2 class="panel-heading">
          <svg viewBox="0 0 24 24" class="panel-icon"><path d="M12 2v6m0 0l-3-3m3 3l3-3"/><path d="M5 12h14"/><path d="M5 12a7 7 0 0 0 14 0"/></svg>
          <span>Faucet</span>
        </h2>
        <p class="faucet-wallet-desc" data-i18n="no_faucet_wallet">No faucet wallet found. Create one to enable the faucet.</p>
        <button id="create-faucet-wallet" type="button" data-i18n="create_faucet_wallet">Create faucet wallet</button>
      </div>
    </section>

    <section class="wallets-row">
      <section class="wallets-panel">
        <div class="panel-title">
          <h2 class="panel-heading">
            <svg viewBox="0 0 24 24" class="panel-icon"><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4z"/></svg>
            <span data-i18n="wallets">Existing wallets</span>
          </h2>
          <div class="panel-title-actions">
            <button id="import-wallets" type="button" class="import-btn" data-i18n="import_wallet">Import</button>
            <button id="export-all-wallets" type="button" class="export-all-btn" data-i18n="export_all">Export all</button>
          </div>
        </div>
        <input type="file" id="import-file-input" accept=".json">
        <div id="wallets-list" class="wallets-list">
          <div class="empty" data-i18n="loading">Loading...</div>
        </div>
      </section>
    </section>

    <section class="panel result-panel">
      <h2 class="panel-heading">
        <svg viewBox="0 0 24 24" class="panel-icon"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
        <span data-i18n="result">Result</span>
      </h2>
      <pre id="output" data-i18n="ready">Ready.</pre>
    </section>
  </main>

  <section id="delete-modal" class="confirm-modal" hidden>
    <div class="confirm-backdrop" data-close-delete></div>
    <div class="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="delete-title">
      <div class="confirm-icon-ring">
        <svg viewBox="0 0 24 24" class="confirm-icon"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-.7 12.1A2 2 0 0 1 16.3 20H7.7a2 2 0 0 1-2-1.9L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
      </div>
      <h2 id="delete-title" data-i18n="delete_title">Delete wallet?</h2>
      <p class="confirm-wallet-name" id="delete-wallet-name"></p>
      <p class="confirm-message" id="delete-message"></p>
      <div class="confirm-actions">
        <button id="cancel-delete" type="button" data-i18n="cancel">Cancel</button>
        <button id="confirm-delete" class="danger-action" type="button" data-i18n="confirm_delete">Delete wallet</button>
      </div>
    </div>
  </section>

  <section id="export-modal" class="confirm-modal" hidden>
    <div class="confirm-backdrop" data-close-export></div>
    <div class="confirm-dialog export-dialog" role="dialog" aria-modal="true" aria-labelledby="export-title">
      <div class="confirm-icon-ring export-icon-ring">
        <svg viewBox="0 0 24 24" class="confirm-icon"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </div>
      <h2 id="export-title">Export wallets?</h2>
      <div id="export-wallet-list" class="export-wallet-list"></div>
      <p class="confirm-message export-warning" id="export-warning"></p>
      <div class="confirm-actions">
        <button id="cancel-export" type="button" data-i18n="cancel">Cancel</button>
        <button id="confirm-export" class="export-action" type="button">Export</button>
      </div>
    </div>
  </section>

  <script src="/static/js/header.js?v=20260508-search-fix"></script>
  <script src="/static/js/wallet.js?v=20260509-wallet-v25"></script>
</body>
</html>
