<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitcoin Core Terminal · Signet</title>
  <link rel="stylesheet" href="/static/app.css" />
  <script type="module" src="/static/app.js"></script>
</head>
<body>

  <div class="topbar">
  <div class="logo">⛏️ Bitcoin Core Terminal · Signet</div>
  <div class="status">
    <span class="dot" id="status-dot"></span>
    <span id="status-text">connecting...</span>
  </div>
  <div class="spacer"></div>
  <div class="topbar-right">
    <span class="countdown-box" id="countdown-box"><span id="countdown-value">10</span><small>s</small></span>
    <div class="lang-menu" id="lang-menu">
      <button class="cog-btn" id="lang-menu-btn" type="button" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
      <div class="lang-menu-pop" id="lang-menu-pop" hidden>
        <button class="lang-option" type="button" data-lang="en-GB">
          <span class="flag">🇬🇧</span>
          <span class="label" id="lang-label-en">English (UK)</span>
          <span class="check">✓</span>
        </button>
        <button class="lang-option" type="button" data-lang="pt-BR">
          <span class="flag">🇧🇷</span>
          <span class="label" id="lang-label-pt">Português (Brasil)</span>
          <span class="check">✓</span>
        </button>
      </div>
    </div>
  </div>
</div>

<main>
  <aside id="sidebar">
    <div id="sidebar-resizer" title="Drag to resize"></div>
    <div class="aside-top">
      <span class="aside-title" id="snippets-title">Snippets</span>
      <input id="snippet-search" type="text" placeholder="Search snippets..." autocomplete="off" spellcheck="false" />
      <button id="btn-toggle-snippets" type="button" title="Collapse/expand">⟨</button>
    </div>
    <div class="aside-body">
      <div id="snippet-list" data-include="/static/snippets.html"></div>
      <hr class="help-sep" />
      <div class="help-group" id="help-group">
        <button class="help-group-header" id="help-toggle" type="button">
          <span class="caret">▾</span>
          <span id="help-title">Tips</span>
        </button>
        <div class="help-group-body">
          <div id="help-cards"></div>
        </div>
      </div>
    </div>
  </aside>

  <section id="workspace"></section>
</main>

</body>
</html>
